{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login to your account</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <header>
      <h1>Smart Social Media Analytics Platform</h1>
      <p class="subtitle">Trend Prediction For Digital Age</p>
    </header>

    <div class="login-form">
      <div class="head">
        <h1>Login</h1>
      </div>

      <div class="content">
        <div class="input-field">
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Username"
            autocomplete="off"
          />
        </div>

        <div class="input-field">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            autocomplete="off"
          />
        </div>

        <br />

        <select id="menuX" name="ctype">
          <option value="administrator">Administrator</option>
          <option value="researcher">Researcher</option>
        </select>

        <br />
        <a href="#" class="link">Forgot Your Password?</a>

        <p
          id="loginError"
          style="color: red; margin-top: 15px; font-size: 14px; display: none"
        >
          Invalid username or password
        </p>
      </div>

      <div class="action">
        <a href="#" onclick="handleLogin(event)">Log in</a>
      </div>
    </div>

    <script>
      function handleLogin(event) {
        event.preventDefault();

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const errorText = document.getElementById("loginError");

        const dummyUsers = [
          { username: "Alex", password: "1001" },
          { username: "Alif", password: "1002" },
        ];

        const matchedUser = dummyUsers.find(
          (user) => user.username === username && user.password === password
        );

        if (matchedUser) {
          localStorage.setItem(
            "loggedInUser",
            JSON.stringify({
              name: matchedUser.username,
              lastVisit: "07.07.2026",
            })
          );

          window.location.href = "{% url 'landing' %}";
        } else {
          errorText.style.display = "block";
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const errorText = document.getElementById("loginError");

        function submitOnEnter(event) {
          if (event.key === "Enter") {
            handleLogin(event);
          }
        }

        usernameInput.addEventListener("keydown", submitOnEnter);
        passwordInput.addEventListener("keydown", submitOnEnter);

        usernameInput.addEventListener("input", function () {
          errorText.style.display = "none";
        });

        passwordInput.addEventListener("input", function () {
          errorText.style.display = "none";
        });
      });
    </script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
